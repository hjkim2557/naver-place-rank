<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 플레이스 순위 조회</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 40px 32px;
            max-width: 480px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #03c75a;
        }
        .hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #03c75a;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #02b350;
        }
        button:disabled {
            background: #a0d8b5;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            display: none;
        }
        .result-box.success {
            background: #e8f8ee;
            color: #03c75a;
            display: block;
        }
        .result-box.not-found {
            background: #fff4e5;
            color: #e67e22;
            display: block;
        }
        .result-box.error {
            background: #fde8e8;
            color: #e74c3c;
            display: block;
        }
        .rank-number {
            font-size: 48px;
            font-weight: 800;
            display: block;
            margin-bottom: 4px;
        }
        .spinner {
            display: none;
            text-align: center;
            margin-top: 24px;
        }
        .spinner.active {
            display: block;
        }
        .spinner-circle {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #03c75a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner-text {
            font-size: 14px;
            color: #888;
        }
        @media (max-width: 520px) {
            body { padding: 20px 12px; }
            .container { padding: 28px 20px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>네이버 플레이스 순위 조회</h1>
        <p class="subtitle">네이버 플레이스 검색 결과 상위 30위 내 순위를 확인하세요</p>

        <form id="rankForm">
            <div class="form-group">
                <label for="keyword">검색 키워드</label>
                <input type="text" id="keyword" name="keyword" placeholder="예: 강남역치과" required>
                <p class="hint">네이버 지도에서 검색할 키워드를 입력하세요</p>
            </div>
            <div class="form-group">
                <label for="place_name">업체명</label>
                <input type="text" id="place_name" name="place_name" placeholder="예: OO치과의원" required>
                <p class="hint">네이버 지도에 등록된 정확한 업체명을 입력하세요<br>예) "명태인생" (X) → "명태인생 수지본점" (O)</p>
            </div>
            <button type="submit" id="submitBtn">순위 조회</button>
        </form>

        <div class="spinner" id="spinner">
            <div class="spinner-circle"></div>
            <p class="spinner-text">순위를 조회하고 있습니다...</p>
        </div>

        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        const form = document.getElementById('rankForm');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const resultBox = document.getElementById('resultBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const keyword = document.getElementById('keyword').value.trim();
            const placeName = document.getElementById('place_name').value.trim();

            if (!keyword || !placeName) return;

            submitBtn.disabled = true;
            spinner.classList.add('active');
            resultBox.className = 'result-box';
            resultBox.removeAttribute('style');

            try {
                const formData = new FormData();
                formData.append('keyword', keyword);
                formData.append('place_name', placeName);

                const response = await fetch('/check', {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();

                if (data.rank !== null) {
                    resultBox.className = 'result-box success';
                    resultBox.innerHTML = `<span class="rank-number">${data.rank}위</span>${data.message}`;
                } else {
                    resultBox.className = 'result-box not-found';
                    resultBox.textContent = data.message;
                }
            } catch (err) {
                resultBox.className = 'result-box error';
                resultBox.textContent = '서버와 통신 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
            } finally {
                submitBtn.disabled = false;
                spinner.classList.remove('active');
            }
        });
    </script>
</body>
</html>
